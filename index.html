<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai GIS Explorer — Web GIS Interaktif</title>
    <meta name="description" content="Aplikasi Web GIS interaktif untuk eksplorasi data geospasial Dubai dengan Leaflet.js dan Turf.js">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ====== LOADING OVERLAY ====== -->
    <div id="loading-overlay">
        <div class="loader-container">
            <div class="loader-ring">
                <div class="loader-ring-inner"></div>
            </div>
            <p class="loader-title">Dubai GIS Explorer</p>
            <p class="loader-status" id="loading-status">Menginisialisasi peta...</p>
            <div class="loader-progress">
                <div class="loader-progress-bar" id="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- ====== TOAST CONTAINER ====== -->
    <div id="toast-container"></div>

    <!-- ====== MAIN LAYOUT ====== -->
    <div id="app-layout">
        <!-- ====== SIDEBAR ====== -->
        <aside id="sidebar">
            <!-- Sidebar Header -->
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
                        </svg>
                    </div>
                    <span>Dubai GIS Explorer</span>
                </div>
                <button id="btn-collapse-sidebar" class="btn-icon" title="Tutup Sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>

            <!-- Data Fitur Section -->
            <div class="sidebar-section">
                <h2 class="section-title">🗺️ Data Fitur</h2>

                <!-- Search Bar -->
                <div class="search-wrapper">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-input" placeholder="Cari nama fitur..." autocomplete="off">
                    <button id="btn-clear-search" class="btn-clear-search hidden" title="Hapus pencarian">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>

                <!-- Feature Counter -->
                <div class="feature-counter" id="feature-counter">
                    Menampilkan <strong id="count-shown">0</strong> dari <strong id="count-total">0</strong> fitur
                </div>

                <!-- Legend -->
                <div class="legend-row">
                    <div class="legend-item">
                        <span class="legend-dot" style="background:#3498DB"></span>
                        <span>🔵 POI</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background:#FF9F43"></span>
                        <span>🟠 Bangunan</span>
                    </div>
                </div>
            </div>

            <!-- Filter Kategori Section -->
            <div class="sidebar-section">
                <h3 class="section-subtitle">FILTER KATEGORI</h3>
                <div id="category-chips" class="chips-container">
                    <!-- Chips will be built dynamically -->
                </div>
            </div>

            <!-- Feature List -->
            <div id="feature-list" class="feature-list">
                <!-- Feature items will be rendered here -->
            </div>

            <!-- Sidebar Footer -->
            <div class="sidebar-footer">
                <span id="footer-info">Powered by Leaflet + Turf.js</span>
            </div>
        </aside>

        <!-- ====== SIDEBAR TOGGLE (when collapsed) ====== -->
        <button id="btn-expand-sidebar" class="btn-expand-sidebar hidden" title="Buka Sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <!-- ====== MAP ====== -->
        <div id="map"></div>
    </div>

    <!-- ====== KOORDINAT KURSOR ====== -->
    <div id="coords-bar">
        <span class="coords-label">📍 Koordinat:</span>
        <span id="coords-value">—, —</span>
    </div>

    <!-- ====== SCRIPTS ====== -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Turf.js/6.5.0/turf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
